name: Stale Issues

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    name: Mark and close stale issues
    runs-on: ubuntu-latest

    steps:
      - name: Sweep stale issues
        uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 7
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: stale
          exempt-issue-labels: pinned,security,bug
          stale-issue-message: >
            This issue has been automatically marked as stale after 60 days of inactivity.
            Add a comment or fresh reproduction details if it still applies to the latest main branch.
          close-issue-message: >
            This issue has been closed after an additional 7 days without activity.
            If the problem still reproduces on the latest main branch, please open a new issue with updated details.

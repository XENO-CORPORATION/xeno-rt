name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: xrt-cli
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: xrt-cli.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p xrt-cli

      - name: Build Server
        run: cargo build --release --target ${{ matrix.target }} -p xrt-server

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/xrt-cli dist/
          cp target/${{ matrix.target }}/release/xrt-server dist/
          cp LICENSE NOTICE README.md dist/
          cd dist && tar czf ../xeno-rt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\xrt-cli.exe dist\
          copy target\${{ matrix.target }}\release\xrt-server.exe dist\
          copy LICENSE dist\
          copy NOTICE dist\
          copy README.md dist\
          cd dist && 7z a ..\xeno-rt-${{ github.ref_name }}-${{ matrix.target }}.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: xeno-rt-${{ matrix.target }}
          path: xeno-rt-${{ github.ref_name }}-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Bug Report
description: Report a bug in xeno-rt
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Load model '...'
        2. Run command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (aarch64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows (x86_64)
        - Other
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "rustc 1.76.0 (07dca489a 2024-02-04)"
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: GPU
      options:
        - None (CPU only)
        - NVIDIA (CUDA)
        - AMD (ROCm)
        - Apple (Metal)
        - Other
    validations:
      required: false

  - type: input
    id: model
    attributes:
      label: Model Information
      description: Model name, quantization format, and source.
      placeholder: "TinyLlama-1.1B-Chat-v1.0, Q4_K, from TheBloke on HuggingFace"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, config, etc.).
    validations:
      required: false

  - type: checkboxes
    id: search
    attributes:
      label: Self-Service
      options:
        - label: I have searched existing issues and this has not been reported before
          required: true

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    labels:
      - dependencies
      - cargo
    commit-message:
      prefix: deps
      include: scope
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
      include: scope
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
